services:
  postgres:
    image: postgres:16
    container_name: url-shortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: app-url-shortener
      POSTGRES_PASSWORD: s3cr3t
    ports:
      - "5432:5432"
    tmpfs: # Use tmpfs to store PostgreSQL data in memory for faster access during tests
      - /var/lib/postgresql/data
    command: >
      postgres
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
      -c shared_buffers=256MB
      -c work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app-url-shortener -d url_shortener"]
      interval: 2s
      timeout: 2s
      retries: 5